<script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB9Ed_6mJEZ_fhITCrf-d9P6KlgpQBLD14",
    authDomain: "robiul-84377.firebaseapp.com",
    projectId: "robiul-84377",
    storageBucket: "robiul-84377.firebasestorage.app",
    messagingSenderId: "476907665212",
    appId: "1:476907665212:web:b4dc619f0290a2241b1039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ১. ডাটাবেজে ভিডিও সেভ করার ফাংশন
  window.shareVideo = async function() {
    const videoLink = document.getElementById("vedioline").value;
    const videoCaption = document.getElementById("caption").value;

    if (videoLink === "") {
      alert("দয়া করে একটি ভিডিও লিংক দিন!");
      return;
    }

    try {
      await addDoc(collection(db, "videos"), {
        link: videoLink,
        caption: videoCaption,
        createdAt: new Date()
      });

      document.getElementById("vedioline").value = "";
      document.getElementById("caption").value = "";
      veclose(); 
      alert("ভিডিও সফলভাবে পাবলিক করা হয়েছে!");
    } catch (e) {
      console.error("Error adding document: ", e);
      alert("কিছু একটা সমস্যা হয়েছে, আবার চেষ্টা করুন।");
    }
  }

  // ২. ডাটাবেজ থেকে রিয়েল-টাইমে ভিডিও এনে পেজে দেখানোর ফাংশন
  const videoFeed = document.getElementById("videoFeed");
  const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));

  onSnapshot(q, (querySnapshot) => {
    videoFeed.innerHTML = ""; // পেজ রিফ্রেশ ছাড়া কন্টেন্ট ক্লিয়ার করা

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      const videoCard = document.createElement("div");
      
      videoCard.style.border = "1px solid #ddd";
      videoCard.style.margin = "15px auto";
      videoCard.style.padding = "10px";
      videoCard.style.background = "#fff";
      videoCard.style.borderRadius = "6px";
      videoCard.style.maxWidth = "100%";

      // --- সোশ্যাল মিডিয়া লিংক চেকিং কন্ডিশন (লুপের ভেতরে) ---
      
      // ১. YouTube Link বা Shorts হলে
      if (data.link.includes("youtube.com") || data.link.includes("youtu.be")) {
        let embedLink = data.link.replace("watch?v=", "embed/").replace("youtu.be/", "youtube.com/embed/");
        if(embedLink.includes("shorts/")) {
          embedLink = embedLink.replace("shorts/", "embed/");
        }
        videoCard.innerHTML = `
          <iframe width="100%" height="300" src="${embedLink}" frameborder="0" allowfullscreen style="border-radius:4px;"></iframe>
          <p style="padding: 8px 5px 0; margin:0; font-weight: bold; color:#333;">${data.caption}</p>
        `;
      } 
      // ২. Facebook Link বা Reels হলে
      else if (data.link.includes("facebook.com")) {
        let fbEmbedLink = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(data.link)}&show_text=false&width=500`;
        videoCard.innerHTML = `
          <iframe src="${fbEmbedLink}" width="100%" height="300" style="border:none;overflow:hidden;border-radius:4px;" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
          <p style="padding: 8px 5px 0; margin:0; font-weight: bold; color:#333;">${data.caption}</p>
        `;
      } 
      // ৩. Instagram Link বা Reels হলে
      else if (data.link.includes("instagram.com")) {
        let instaLink = data.link.split('?')[0]; 
        if (!instaLink.endsWith('/')) {
          instaLink += '/';
        }
        let instaEmbedLink = instaLink + "embed/";
        videoCard.innerHTML = `
          <iframe src="${instaEmbedLink}" width="100%" height="400" frameborder="0" scrolling="no" allowtransparency="true" style="border-radius:4px;"></iframe>
          <p style="padding: 8px 5px 0; margin:0; font-weight: bold; color:#333;">${data.caption}</p>
        `;
      } 
      // ৪. TikTok Link হলে
      else if (data.link.includes("tiktok.com")) {
        let tiktokEmbedLink = `https://www.tiktok.com/embed/v2/${data.link.split('/video/')[1]?.split('?')[0]}`;
        
        if (!tiktokEmbedLink.includes("undefined")) {
          videoCard.innerHTML = `
            <iframe src="${tiktokEmbedLink}" width="100%" height="450" frameborder="0" allowfullscreen style="border-radius:4px;"></iframe>
            <p style="padding: 8px 5px 0; margin:0; font-weight: bold; color:#333;">${data.caption}</p>
          `;
        } else {
          videoCard.innerHTML = `
            <div style="padding:20px; background:#eee; text-align:center; border-radius:4px;">
              <i class="fa-brands fa-tiktok" style="font-size:30px;"></i>
              <p><a href="${data.link}" target="_blank" style="color:#000; font-weight:bold;">Watch TikTok Video</a></p>
            </div>
            <p style="padding: 8px 5px 0; margin:0; font-weight: bold; color:#333;">${data.caption}</p>
          `;
        }
      } 
      // ৫. অন্য কোনো ডিরেক্ট MP4 ভিডিও লিংক হলে
      else {
        videoCard.innerHTML = `
          <video width="100%" height="300" controls style="border-radius:4px;">
            <source src="${data.link}" type="video/mp4">
            Your browser does not support the video tag.
          </video>
          <p style="padding: 8px 5px 0; margin:0; font-weight: bold; color:#333;">${data.caption}</p>
        `;
      }

      // কার্ডটি মেইন ফিডে যুক্ত করা হচ্ছে
      videoFeed.appendChild(videoCard);
    });
  });
</script>
