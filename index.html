/* ================= LOAD PRODUCTS ================= */
function loadProducts(){
let box = document.getElementById("productList");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML += `
<div class="product" onclick="openModal(${p.id})">
<img src="${p.images[0]}" alt="${p.name} online shopping Bangladesh">
<p>${p.name}</p>
 <p class="pprice">${p.price[1]}</p>
</div>
`;
});
}

loadProducts();

/* ================= MODAL ================= */
function openModal(id){
let p = products.find(x=>x.id===id);

document.getElementById("modal").style.display="block";
document.getElementById("mainImg").src=p.images[0];
document.getElementById("pname").innerText=p.name;
document.getElementById("pcode").innerText="Code: "+p.code;
document.getElementById("ppieces").innerHTML =p.ppieces.map(x => `<span>${x}</span>`).join("");
document.getElementById("pprice").innerHTML =p.price.map(x => `<span>${x}</span>`).join("");
document.getElementById("pdetails").innerText=p.details;
let thumbs=document.getElementById("thumbs");
thumbs.innerHTML="";

p.images.forEach(img=>{
thumbs.innerHTML+=`
<img src="${img}" onclick="document.getElementById('mainImg').src='${img}'">
`;
});
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ================= SEARCH ================= */
function searchProduct(){

let input1 = document.getElementById("search").value.toLowerCase();
let input2 = document.getElementById("ONEsearch").value.toLowerCase();

let input = input1 || input2;

let items = document.querySelectorAll(".product");

items.forEach(item=>{
if(item.innerText.toLowerCase().includes(input)){
item.style.display="block";
}else{
item.style.display="none";
}
});

}
function filterProducts(category){

let box = document.getElementById("productList");
box.innerHTML = "";

let filtered = category === "all"
  ? products
  : products.filter(p => {

      if(Array.isArray(p.category)){
        return p.category.includes(category);
      }

      return p.category === category;
  });

filtered.forEach(p=>{
box.innerHTML += `
<div class="product" onclick="openModal(${p.id})">
<img src="${p.images[0]}">
<p>${p.name}</p>
</div>
`;
});

}
