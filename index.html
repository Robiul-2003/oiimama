    images: ["https://images.othoba.com/images/thumbs/2029126_airpods-pro-2nd-generation-premium-quality-anc-usa-version-a-grade-white_400.jpeg"],

  }
];

window.allProducts = [...localProducts];
let savedUserProducts = JSON.parse(localStorage.getItem("userProducts")) || [];
window.allProducts = [...window.allProducts, ...savedUserProducts];

// ডিলিট বাটন দেখানোর লজিক (শুধুমাত্র অ্যাডমিন ভেরিফাইড হলে শো করবে)
function renderProducts(productsToDisplay) {
  let box = document.getElementById("productList");
  box.innerHTML = "";
  
  // চেক করা হচ্ছে ব্রাউজারে ডিলিট করার পারমিশন অ্যাক্টিভ আছে কি না
  let isAdmin = localStorage.getItem("isDeleteAdmin") === "true";

  productsToDisplay.forEach(p => {
    let imgSrc = (p.images && p.images[0]) ? p.images[0] : 'logo.png';
    let displayPrice = Array.isArray(p.price) ? p.price[0] : (p.price + " TK");
    let isLocal = ["1", "2", "3", "4"].includes(String(p.id));
    
    let deleteBtn = "";
    // আপনি অ্যাডমিন হলে এবং প্রোডাক্টটি লোকাল না হলে (ইউজার বা ফায়ারবেসের হলে) X দেখাবে
    if (isAdmin && !isLocal) {
      deleteBtn = `<span class="p-delete-x" onclick="deleteProduct('${p.id}', event)">×</span>`;
    }

    box.innerHTML += `
      <div class="product" onclick="openModal('${p.id}')" style="position: relative;">
        ${deleteBtn}
        <img src="${imgSrc}" alt="${p.name}">
        <p>${p.name}</p>
        <p class="pprice">${displayPrice}</p>
      </div>
    `;
  });
}

// সিক্রেট অ্যাডমিন মোড অ্যাক্টিভ করার ফাংশন
function adminMode() {
  let pin = prompt("ডিলিট অপশন চালু করতে সিক্রেট পিন দিন:");
  if(pin === "2026") { // আপনার সিক্রেট পিন
    localStorage.setItem("isDeleteAdmin", "true");
    alert("ডিলিট মোড সফলভাবে চালু হয়েছে!");
    renderProducts(window.allProducts);
  } else if(pin === "logout") { 
    localStorage.removeItem("isDeleteAdmin");
    alert("ডিলিট মোড বন্ধ করা হয়েছে।");
    renderProducts(window.allProducts);
  } else {
    alert("ভুল পিন!");
  }
}

async function deleteProduct(id, event) {
  if (event) event.stopPropagation(); 
  if (!confirm("আপনি কি এই প্রোডাক্টটি ডিলিট করতে চান?")) return;

  let savedUserProducts = JSON.parse(localStorage.getItem("userProducts")) || [];
  let updatedUserProducts = savedUserProducts.filter(x => String(x.id) !== String(id));
  localStorage.setItem("userProducts", JSON.stringify(updatedUserProducts));

  try {
    const docRef = doc(db, "products", id.toString());
    await deleteDoc(docRef);
    alert("প্রোডাক্টটি সফলভাবে ডিলিট হয়েছে!");
  } catch (error) {
    console.log("ডিলিট এরর:", error);
  }

  window.allProducts = window.allProducts.filter(x => String(x.id) !== String(id));
  renderProducts(window.allProducts);
}

function openModal(id){
  let p = window.allProducts.find(x => String(x.id) === String(id));
  if(!p) return;
  
  document.getElementById("modal").style.display="block";
  document.getElementById("mainImg").src = (p.images && p.images[0]) ? p.images[0] : 'logo.png';
  document.getElementById("pname").innerText = p.name;
  document.getElementById("pcode").innerText = "Code: " + (p.code || 'N/A');
  
  if(p.ppieces && Array.isArray(p.ppieces)) {
    document.getElementById("ppieces").innerHTML = p.ppieces.map(x => `<span>${x}</span>`).join("");
  } else {
    document.getElementById("ppieces").innerHTML = "<span>Standard</span>";
  }
  
  if(p.price && Array.isArray(p.price)) {
    document.getElementById("pprice").innerHTML = p.price.map(x => `<span>${x}</span>`).join("");
  } else {
    document.getElementById("pprice").innerHTML = `<span>${p.price} TK</span>`;
  }
  
  document.getElementById("pdetails").innerText = p.details || '';
  
  let thumbs = document.getElementById("thumbs");
  thumbs.innerHTML = "";
  if(p.images && Array.isArray(p.images)){
    p.images.forEach(img => {
      thumbs.innerHTML += `<img src="${img}" onclick="document.getElementById('mainImg').src='${img}'">`;
    });
  }
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function checkLogin(){
    let number = document.getElementById("number").value.trim();
    let pin = document.getElementById("pin").value.trim();
    if(number === "123456789" && pin === "2026"){
        window.location.href = "add.html";
    }else{
        alert("Wrong Number or PIN");
    }
}

function searchProduct(){
  let input1 = document.getElementById("search").value.toLowerCase();
  let input2 = document.getElementById("ONEsearch").value.toLowerCase();
  let input = input1 || input2;
  
  let filtered = window.allProducts.filter(p => 
    p.name.toLowerCase().includes(input)
  );
  renderProducts(filtered);
}

function filterProducts(category){
  if(category === "all") {
    renderProducts(window.allProducts);
  } else {
    let filtered = window.allProducts.filter(p => {
      if(Array.isArray(p.category)){
        return p.category.includes(category);
      }
      return p.category === category;
    });
    renderProducts(filtered);
  }
}

function searchicon(){ document.getElementById("opensearchbox").style.display= "block"; }
function searchclose(){ document.getElementById("opensearchbox").style.display= "none"; }
function demo(){ document.getElementById("openlistbox").style.display= "block"; }

function padd(){ document.getElementById("productcloseo").style.display= "block"; }
function proclose(){ document.getElementById("productcloseo").style.display= "none"; }

function orderNow(){
  let productName = document.getElementById("pname").innerText;
  let productCode = document.getElementById("pcode").innerText.replace("Code: ","");
  let message = `🛒 New Order Request\n\n📦 Product: ${productName}\n🔢 Code: ${productCode}`;
  let url = "https://wa.me/8801614153820?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

async function loadFirebaseProducts() {
  try {
    const querySnapshot = await getDocs(collection(db, "products"));
    querySnapshot.forEach((doc) => {
      let p = doc.data();
      if(!p.id) p.id = doc.id; 
      
      if (!window.allProducts.some(x => String(x.id) === String(p.id))) {
         window.allProducts.push(p);
      }
    });
    renderProducts(window.allProducts);
  } catch (error) {
    console.error("Error loading products: ", error);
  }
}

// Global window mapping
window.openModal = openModal;
window.closeModal = closeModal;
window.checkLogin = checkLogin;
window.searchProduct = searchProduct;
window.filterProducts = filterProducts;
window.searchicon = searchicon;
window.searchclose = searchclose;
window.demo = demo;
window.listclose = listclose;
window.padd = padd;
window.proclose = proclose;
window.orderNow = orderNow;
window.deleteProduct = deleteProduct;
window.adminMode = adminMode;

renderProducts(window.allProducts);
loadFirebaseProducts();
</script>
