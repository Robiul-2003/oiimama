<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9Ed_6mJEZ_fhITCrf-d9P6KlgpQBLD14",
  authDomain: "robiul-84377.firebaseapp.com",
  projectId: "robiul-84377",
  storageBucket: "robiul-84377.firebasestorage.app",
  messagingSenderId: "476907665212",
  appId: "1:476907665212:web:874ccf5a0f2825f71b1039"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function deleteVideo(videoId){

    let confirmDelete = confirm("আপনি কি এই ভিডিওটি Delete করতে চান?");

    if(confirmDelete){

        try{

            await deleteDoc(doc(db, "videos", videoId));

            alert("Video Deleted Successfully");

        }catch(error){

            console.log(error);
            alert("Delete failed");

        }

    }

}

window.deleteVideo = deleteVideo;






onAuthStateChanged(auth, async (user) => {
    if (user) {
        // ১. ইউজারের নাম দেখানো
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
            let data = userSnap.data();
            document.getElementById("showName").innerHTML = data.name;
        }

        // ২. ইউজারের নিজের ভিডিওগুলো ফিল্টার করে আনা
        const videoFeed = document.getElementById("userVideoFeed");
        
        // শুধু এই ইউজারের ভিডিও খোঁজার কোয়েরি
        const q = query(collection(db, "videos"), where("userId", "==", user.uid));

        onSnapshot(q, (querySnapshot) => {
            let userVideos = [];
            querySnapshot.forEach((doc) => {
                userVideos.push({ id: doc.id, ...doc.data() });
            });

            // নতুন ভিডিওগুলো সবার উপরে দেখানোর জন্য সর্টিং
            userVideos.sort((a, b) => b.createdAt.toDate() - a.createdAt.toDate());

            videoFeed.innerHTML = ""; // পুরানো ডেটা ক্লিয়ার করা

            if (userVideos.length === 0) {
                videoFeed.innerHTML = "<p style='text-align:center; color:gray;'>আপনি এখনো কোনো ভিডিও যোগ করেননি।</p>";
                return;
            }

            // ভিডিওগুলো রেন্ডার করা
            userVideos.forEach((data) => {
                const videoCard = document.createElement("div");
                videoCard.style.border = "1px solid #ddd";
                videoCard.style.padding = "15px";
                videoCard.style.marginBottom = "15px";
                videoCard.style.borderRadius = "8px";
                videoCard.style.background = "#fff";

                let videoElement = "";
                
                // ভিডিও এম্বেড করার লজিক
                if (data.link.includes("youtube.com") || data.link.includes("youtu.be")) {
                    let embedLink = data.link.replace("watch?v=", "embed/").replace("youtu.be/", "youtube.com/embed/");
                    if(embedLink.includes("shorts/")) embedLink = embedLink.replace("shorts/", "embed/");
                    videoElement = `<iframe width="100%" height="300" src="${embedLink}" frameborder="0" allowfullscreen style="border-radius:4px;"></iframe>`;
                } 
                else if (data.link.includes("facebook.com") || data.link.includes("fb.watch")) {
                    let fbEmbedLink = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(data.link)}&show_text=false&width=500`;
                    videoElement = `<iframe src="${fbEmbedLink}" width="100%" height="300" style="border:none;overflow:hidden;border-radius:4px;" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`;
                }
                else if (data.link.includes("tiktok.com")) {
                    let tiktokEmbedLink = `https://www.tiktok.com/embed/v2/${data.link.split('/video/')[1]?.split('?')[0]}`;
                    if (!tiktokEmbedLink.includes("undefined")) {
                        videoElement = `<iframe src="${tiktokEmbedLink}" width="100%" height="500" frameborder="0" allowfullscreen style="border-radius:4px;"></iframe>`;
                    }
                } 
                else {
                    videoElement = `<video width="100%" height="auto" controls playsinline style="border-radius:4px;"><source src="${data.link}" type="video/mp4"></video>`;
                }
               videoCard.innerHTML = `
    ${videoElement}

    <p style="padding-top:10px; margin:0; font-weight:bold;">
    ${data.caption}
    </p>

    <p style="font-size:12px;color:#777;">
    ${data.likes || 0} Likes | ${data.views || 0} Views
    </p>

    <button onclick="deleteVideo('${data.id}')"
    style="
    background:red;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;">
    Delete
    </button>
`;
                
                videoFeed.appendChild(videoCard);
            });
        });

    } else {
        document.getElementById("showName").innerHTML = "Guest User";
        document.getElementById("userVideoFeed").innerHTML = "<p style='text-align:center;'>ভিডিও দেখতে দয়া করে লগইন করুন।</p>";
    }
});
</script>
