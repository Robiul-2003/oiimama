<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<title>Sign up - AdarshaBD</title>
<link rel="icon" href="logo.png">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f9;
}
.box {
    width: 360px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    position: relative;
}
/* BACK BUTTON */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 18px;
    cursor: pointer;
    color: #666;
    transition: color 0.2s;
}
.back:hover {
    color: #007bff;
}
h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    font-weight: 600;
}
.input-group {
    position: relative;
    margin-bottom: 16px;
}
.input-group i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 16px;
}
input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}
input:focus {
    border-color: #007bff;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    transition: background 0.2s;
}
.signup {
    background: #28a745;
    color: white;
    margin-top: 10px;
}
.signup:hover {
    background: #218838;
}
.or-divider {
    text-align: center;
    margin: 15px 0;
    color: #888;
    font-size: 13px;
    position: relative;
}
.login {
    background: transparent;
    color: #007bff;
    border: 1px solid #007bff;
}
.login:hover {
    background: #f0f7ff;
}
</style>
</head>
<body>
<div class="box">

    <!-- BACK BUTTON -->
    <div class="back" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-arrow-left"></i>
    </div>

    <h2>Create Account</h2>

    <!-- Full Name -->
    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <!-- Email or Phone -->
    <div class="input-group">
        <i class="fa-solid fa-address-book"></i>
        <input type="text" id="identifier" placeholder="Email or Phone Number">
    </div>

    <!-- Password -->
    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="signup" onclick="signup()">Sign Up</button>

    <div class="or-divider">Already have an account?</div>

    <!-- LOGIN PAGE BUTTON -->
    <button class="login" onclick="window.location.href='login.html'">
         Login
    </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9Ed_6mJEZ_fhITCrf-d9P6KlgpQBLD14",
  authDomain: "robiul-84377.firebaseapp.com",
  projectId: "robiul-84377",
  storageBucket: "robiul-84377.firebasestorage.app",
  messagingSenderId: "476907665212",
  appId: "1:476907665212:web:874ccf5a0f2825f71b1039"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= SIGN UP =================
window.signup = async function(){

    let name = document.getElementById("name").value.trim();
    let identifier = document.getElementById("identifier").value.trim();
    let password = document.getElementById("password").value;

    if(!name || !identifier || !password){
        alert("সব ঘর পূরণ করুন!");
        return;
    }

    if(password.length < 6){
        alert("Password কমপক্ষে 6 character হতে হবে!");
        return;
    }

    let emailToAuth = "";
    let finalPhone = "";
    let finalEmail = "";

    // চেক করা হচ্ছে ইনপুটটি ইমেইল নাকি ফোন নাম্বার
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    if(emailRegex.test(identifier)){
        // ব্যবহারকারী ইমেইল দিয়েছেন
        emailToAuth = identifier;
        finalEmail = identifier;
        finalPhone = "Not Provided"; 
    } else {
        // ব্যবহারকারী ফোন নাম্বার দিয়েছেন (ধরে নেওয়া হচ্ছে এটি নাম্বার)
        // ফায়ারবেস অথ এর জন্য একটি ভার্চুয়াল ইমেইল তৈরি করা হচ্ছে
        emailToAuth = identifier + "@phone.com";
        finalPhone = identifier;
        finalEmail = "Not Provided";
    }

    try{
        const userCredential = await createUserWithEmailAndPassword(auth, emailToAuth, password);
        const user = userCredential.user;

        // ডাটাবেসে ব্যবহারকারীর প্রকৃত তথ্য সেভ করা হচ্ছে
        await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            name: name,
            phone: finalPhone,
            email: finalEmail,
            joinedAt: new Date().toISOString()
        });

        alert("Account Created Successfully!");
        window.location.href = "index.html";

    }catch(error){
        if(error.code === "auth/email-already-in-use"){
            alert("এই ইমেইল বা ফোন নাম্বার দিয়ে ইতিমধ্যে অ্যাকাউন্ট তৈরি করা হয়েছে!");
        } else {
            alert(error.message);
        }
    }
};
</script>
</body>
</html>
