<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product - 5 Image Slots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212; 
            color: #fff;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 650px;
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #bbb;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .image-slot {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            background-color: #2d2d2d;
            border-radius: 10px;
            border: 1px solid #3a3a3a;
            overflow: hidden;
            cursor: pointer;
        }

        .slot-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #0b2f61;
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 2;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: #581515;
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: none; 
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 3;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background-color: #8a1f1f;
        }

        .image-slot img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 20px;
            pointer-events: none;
        }

        .btn-submit {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add New Product</h2>
    <form id="productForm">
        
        <div class="form-group">
            <label for="productName">Product Name *</label>
            <input type="text" id="productName" placeholder="Product Name" required>
        </div>
        <div class="form-group">
            <label for="productprice">Product Price *</label>
            <input type="number" id="productprice" placeholder="Price" required>
        </div>
         <div class="form-group">
            <label for="Codenumber">Code Number *</label>
            <input type="number" id="Codenumber" placeholder="Code Number" required>
        </div>
        <div class="form-group">
            <label for="productCategory">Category *</label>
            <select id="productCategory" required>
                <option value="" disabled selected>Select a category</option>
                <option value="clothing">Clothing & Fashion</option>
                <option value="electronics">Electronics</option>
                <option value="gadget">Gadget</option>
                <option value="man">Man</option>
                <option value="woman">Woman</option>
                <option value="baby">Baby</option>
                <option value="Kitchen">Kitchen</option>
                <option value="accessories">Accessories</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Product Images (Click slots to upload)</label>
            <div class="image-grid">
                <div class="image-slot" onclick="triggerInput(1)">
                    <div class="slot-number">1</div>
                    <div class="delete-btn" id="delete-1" onclick="deleteImage(event, 1)">X</div>
                    <span class="upload-icon" id="icon-1">+</span>
                    <img id="img-1" alt="Preview">
                    <input type="file" id="input-1" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 1)">
                </div>
                <div class="image-slot" onclick="triggerInput(2)">
                    <div class="slot-number">2</div>
                    <div class="delete-btn" id="delete-2" onclick="deleteImage(event, 2)">X</div>
                    <span class="upload-icon" id="icon-2">+</span>
                    <img id="img-2" alt="Preview">
                    <input type="file" id="input-2" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 2)">
                </div>
                <div class="image-slot" onclick="triggerInput(3)">
                    <div class="slot-number">3</div>
                    <div class="delete-btn" id="delete-3" onclick="deleteImage(event, 3)">X</div>
                    <span class="upload-icon" id="icon-3">+</span>
                    <img id="img-3" alt="Preview">
                    <input type="file" id="input-3" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 3)">
                </div>
                <div class="image-slot" onclick="triggerInput(4)">
                    <div class="slot-number">4</div>
                    <div class="delete-btn" id="delete-4" onclick="deleteImage(event, 4)">X</div>
                    <span class="upload-icon" id="icon-4">+</span>
                    <img id="img-4" alt="Preview">
                    <input type="file" id="input-4" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 4)">
                </div>
                <div class="image-slot" onclick="triggerInput(5)">
                    <div class="slot-number">5</div>
                    <div class="delete-btn" id="delete-5" onclick="deleteImage(event, 5)">X</div>
                    <span class="upload-icon" id="icon-5">+</span>
                    <img id="img-5" alt="Preview">
                    <input type="file" id="input-5" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 5)">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="productDescription">Description</label>
            <input type="text" id="productDescription" placeholder="Write product description..." required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Add Product</button>
    </form>
</div>

<script>
    window.triggerInput = function(slotNum) {
        document.getElementById(`input-${slotNum}`).click();
    }

    window.previewSlotImage = function(input, slotNum) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const max_size = 500;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    const imgElement = document.getElementById(`img-${slotNum}`);
                    imgElement.src = compressedBase64;
                    imgElement.style.display = 'block';
                    document.getElementById(`delete-${slotNum}`).style.display = 'flex';
                    document.getElementById(`icon-${slotNum}`).style.display = 'none';
                }
            }
            reader.readAsDataURL(file);
        }
    }

    window.deleteImage = function(event, slotNum) {
        event.stopPropagation(); 
        document.getElementById(`input-${slotNum}`).value = "";
        const imgElement = document.getElementById(`img-${slotNum}`);
        imgElement.style.display = 'none';
        imgElement.removeAttribute('src'); 
        document.getElementById(`delete-${slotNum}`).style.display = 'none';
        document.getElementById(`icon-${slotNum}`).style.display = 'block';
    }
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB9Ed_6mJEZ_fhITCrf-d9P6KlgpQBLD14",
    authDomain: "robiul-84377.firebaseapp.com",
    projectId: "robiul-84377",
    storageBucket: "robiul-84377.firebasestorage.app",
    messagingSenderId: "476907665212",
    appId: "1:476907665212:web:874ccf5a0f2825f71b1039"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("productForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    let submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = "Uploading... Please wait...";
    submitBtn.disabled = true;

    let images = [];
    for(let i = 1; i <= 5; i++){
        let imgElement = document.getElementById("img-" + i);
        if(imgElement && imgElement.style.display === 'block' && imgElement.src) {
            images.push(imgElement.src);
        }
    }

    let priceValue = document.getElementById("productprice").value;
    let customId = Date.now().toString(); // ইউনিক আইডি তৈরি করা হলো (String ফর্মাটে)

    let product = {
        id: customId,
        category: [document.getElementById("productCategory").value],
        name: document.getElementById("productName").value,
        code: document.getElementById("Codenumber").value || customId.slice(-6),
        ppieces: ["1-5", "6-10", "11-20"],
        price: [
            priceValue + " TK",
            priceValue + " TK",
            priceValue + " TK"
        ],
        images: images,
        details: document.getElementById("productDescription").value
    };

    try {
        // ১. ফায়ারবেসে কাস্টম আইডি ব্যবহার করে ডেটা আপলোড (setDoc দিয়ে)
        await setDoc(doc(db, "products", customId), product);

        // ২. লোকাল স্টোরেজেও সেভ
        let userProducts = JSON.parse(localStorage.getItem("userProducts")) || [];
        userProducts.push(product);
        localStorage.setItem("userProducts", JSON.stringify(userProducts));

        alert("Product Added Successfully to Firebase & LocalStorage!");
        window.location.href = "index.html";

    } catch (error) {
        console.error("Firebase error: ", error);
        alert("Error saving data: " + error.message);
        submitBtn.innerText = "Add Product";
        submitBtn.disabled = false;
    }
});
</script>
</body>
</html>
