<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product - 5 Image Slots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212; 
            color: #fff;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 650px;
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #bbb;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .image-slot {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            background-color: #2d2d2d;
            border-radius: 10px;
            border: 1px solid #3a3a3a;
            overflow: hidden;
            cursor: pointer;
        }

        .slot-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #0b2f61;
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 2;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: #581515;
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: none; 
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 3;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background-color: #8a1f1f;
        }

        .image-slot img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 20px;
            pointer-events: none;
        }

        .btn-submit {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add New Product</h2>
    <form id="productForm">
        
        <div class="form-group">
            <label for="productName">Product Name *</label>
            <input type="text" id="productName" placeholder="Product Name" required>
        </div>
        <div class="form-group">
            <label for="productprice">Product Price *</label>
            <input type="number" id="productprice" placeholder="Price" required>
        </div>
         <div class="form-group">
            <label for="Codenumber">Code Number *</label>
            <input type="number" id="Codenumber" placeholder="Code Number" required>
        </div>
        <div class="form-group">
            <label for="productCategory">Category *</label>
            <select id="productCategory" required>
                <option value="" disabled selected>Select a category</option>
                <option value="clothing">Clothing & Fashion</option>
                <option value="electronics">Electronics</option>
                <option value="gadget">Gadget</option>
                <option value="man">Man</option>
                <option value="woman">Woman</option>
                <option value="baby">Baby</option>
                <option value="Kitchen">Kitchen</option>
                <option value="accessories">Accessories</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Product Images (Click slots to upload)</label>
            <div class="image-grid">
                <div class="image-slot" onclick="triggerInput(1)">
                    <div class="slot-number">1</div>
                    <div class="delete-btn" id="delete-1" onclick="deleteImage(event, 1)">X</div>
                    <span class="upload-icon" id="icon-1">+</span>
                    <img id="img-1" alt="Preview">
                    <input type="file" id="input-1" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 1)">
                </div>
                <div class="image-slot" onclick="triggerInput(2)">
                    <div class="slot-number">2</div>
                    <div class="delete-btn" id="delete-2" onclick="deleteImage(event, 2)">X</div>
                    <span class="upload-icon" id="icon-2">+</span>
                    <img id="img-2" alt="Preview">
                    <input type="file" id="input-2" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 2)">
                </div>
                <div class="image-slot" onclick="triggerInput(3)">
                    <div class="slot-number">3</div>
                    <div class="delete-btn" id="delete-3" onclick="deleteImage(event, 3)">X</div>
                    <span class="upload-icon" id="icon-3">+</span>
                    <img id="img-3" alt="Preview">
                    <input type="file" id="input-3" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 3)">
                </div>
                <div class="image-slot" onclick="triggerInput(4)">
                    <div class="slot-number">4</div>
                    <div class="delete-btn" id="delete-4" onclick="deleteImage(event, 4)">X</div>
                    <span class="upload-icon" id="icon-4">+</span>
                    <img id="img-4" alt="Preview">
                    <input type="file" id="input-4" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 4)">
                </div>
                <div class="image-slot" onclick="triggerInput(5)">
                    <div class="slot-number">5</div>
                    <div class="delete-btn" id="delete-5" onclick="deleteImage(event, 5)">X</div>
                    <span class="upload-icon" id="icon-5">+</span>
                    <img id="img-5" alt="Preview">
                    <input type="file" id="input-5" accept="image/*" style="display: none;" onchange="previewSlotImage(this, 5)">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="productDescription">Description</label>
            <input type="text" id="productDescription" placeholder="Write product description..." required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Add Product</button>
    </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB9Ed_6mJEZ_fhITCrf-d9P6KlgpQBLD14",
    authDomain: "robiul-84377.firebaseapp.com",
    projectId: "robiul-84377",
    storageBucket: "robiul-84377.firebasestorage.app",
    messagingSenderId: "476907665212",
    appId: "1:476907665212:web:874ccf5a0f2825f71b1039"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// Login user detect
onAuthStateChanged(auth, (user) => {

    if(user){
        currentUser = user;
        console.log("Login:", user.uid);
    }else{
        currentUser = null;
        console.log("Not Login");
    }

});

// ================= IMAGE =================

window.triggerInput = function(id){
    document.getElementById("input-"+id).click();
}

window.previewSlotImage = function(input,id){

    const file=input.files[0];

    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(e){

        document.getElementById("img-"+id).src=e.target.result;
        document.getElementById("img-"+id).style.display="block";

        document.getElementById("icon-"+id).style.display="none";

        document.getElementById("delete-"+id).style.display="flex";

    }

    reader.readAsDataURL(file);

}

window.deleteImage=function(event,id){

    event.stopPropagation();

    document.getElementById("input-"+id).value="";

    document.getElementById("img-"+id).src="";

    document.getElementById("img-"+id).style.display="none";

    document.getElementById("icon-"+id).style.display="block";

    document.getElementById("delete-"+id).style.display="none";

}

// ================= ADD PRODUCT =================

document.getElementById("productForm").addEventListener("submit",async(e)=>{

    e.preventDefault();

    if(!currentUser){

        alert("Please Login First.");

        return;

    }

    const btn=document.getElementById("submitBtn");

    btn.disabled=true;
    btn.innerText="Uploading...";

    let images=[];

    for(let i=1;i<=5;i++){

        const img=document.getElementById("img-"+i);

        if(img.style.display=="block"){

            images.push(img.src);

        }

    }

    const id=Date.now().toString();

    const price=document.getElementById("productprice").value;

    const product={

        id:id,

        name:document.getElementById("productName").value,

        code:document.getElementById("Codenumber").value,

        category:[
            document.getElementById("productCategory").value
        ],

        details:document.getElementById("productDescription").value,

        ppieces:["1-5","6-10","11-20"],

        price:[
            price+" TK",
            price+" TK",
            price+" TK"
        ],

        images:images,

        ownerUid:currentUser.uid,

        ownerEmail:currentUser.email,

        createdAt:serverTimestamp()

    };

    try{

        await setDoc(doc(db,"products",id),product);

        alert("✅ Product Added Successfully");

        document.getElementById("productForm").reset();

        location.href="index.html";

    }catch(error){

        console.error(error);

        alert(error.message);

        btn.disabled=false;

        btn.innerText="Add Product";

    }

});
</script>
</body>
</html>
