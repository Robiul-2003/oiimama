<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9Ed_6mJEZ_fhITCrf-d9P6KlgpQBLD14",
  authDomain: "robiul-84377.firebaseapp.com",
  projectId: "robiul-84377",
  storageBucket: "robiul-84377.firebasestorage.app",
  messagingSenderId: "476907665212",
  appId: "1:476907665212:web:874ccf5a0f2825f71b1039"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// এখানে ফায়ারবেস এবং লোকালস্টোরেজ এর সাবমিট লজিক এক করা হয়েছে
document.getElementById("productForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let images = [];
    for(let i = 1; i <= 5; i++){
        let imgElement = document.getElementById("img-" + i);
        // শুধুমাত্র ছবি আপলোড করা হয়েছে এমন স্লটগুলোর src নেওয়া হচ্ছে (Base64 ফরম্যাটে)
        if(imgElement && imgElement.style.display === 'block' && imgElement.src) {
            images.push(imgElement.src);
        }
    }

    let priceValue = document.getElementById("productprice").value;

    let product = {
        id: Date.now(),
        category: [document.getElementById("productCategory").value],
        name: document.getElementById("productName").value,
        code: document.getElementById("Codenumber").value || Date.now().toString().slice(-6),
        ppieces: ["1-5", "6-10", "11-20"],
        price: [
            priceValue + " TK",
            priceValue + " TK",
            priceValue + " TK"
        ],
        images: images,
        details: document.getElementById("productDescription").value
    };

    try {
        // ১. ফায়ারবেস ফায়ারস্টোরে "products" নামক কালেকশনে ডেটা সেভ করা হচ্ছে
        await addDoc(collection(db, "products"), product);
        console.log("Firebase-e data save hoyeche!");

        // ২. লোকাল স্টোরেজেও ব্যাকআপ হিসেবে ডেটা সেভ করা হচ্ছে
        let userProducts = JSON.parse(localStorage.getItem("userProducts")) || [];
        userProducts.push(product);
        localStorage.setItem("userProducts", JSON.stringify(userProducts));

        alert("Product Added Successfully to Firebase & LocalStorage");
        window.location.href = "index.html";

    } catch (error) {
        console.error("Firebase error: ", error);
        alert("Firebase-e data pathate somossa hoyeche! " + error.message);
    }
});
</script>
